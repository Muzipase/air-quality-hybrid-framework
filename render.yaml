services:
  - type: web
    name: air-quality-api
    runtime: python
    pythonVersion: "3.13"
    buildCommand: apt-get update && apt-get install -y build-essential && pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_API_TOKEN
        generateValue: true
